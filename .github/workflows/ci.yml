name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Debug
            sanitizers: ON
          - compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Release
            sanitizers: OFF
          - compiler: clang
            cc: clang
            cxx: clang++
            build_type: Debug
            sanitizers: ON
          - compiler: clang
            cc: clang
            cxx: clang++
            build_type: Release
            sanitizers: OFF
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build gcc g++ clang

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_ASAN=${{ matrix.sanitizers }} \
            -DENABLE_UBSAN=${{ matrix.sanitizers }} \
            -DLIQUIBOOK_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          files=$(find . -name '*.cpp' -o -name '*.hpp' | grep -v '/build')
          if [ -n "$files" ]; then
            clang-format --dry-run --Werror $files
          fi
