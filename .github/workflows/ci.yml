name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Debug
            sanitizers: ON
          - compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Release
            sanitizers: OFF
          - compiler: clang
            cc: clang
            cxx: clang++
            build_type: Debug
            sanitizers: ON
          - compiler: clang
            cc: clang
            cxx: clang++
            build_type: Release
            sanitizers: OFF
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build gcc g++ clang

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_ASAN=${{ matrix.sanitizers }} \
            -DENABLE_UBSAN=${{ matrix.sanitizers }} \
            -DLIQUIBOOK_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

  tsan:
    name: clang / TSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang

      # ENABLE_TSAN is mutually exclusive with ENABLE_ASAN/ENABLE_UBSAN (see
      # cmake/Sanitizers.cmake) -- a separate job, not another matrix leg of build-and-test.
      # One compiler (clang) is enough: races TSan catches are essentially never
      # compiler-specific, so gcc+clang here would double CI time for negligible extra
      # coverage. Runs the full suite, matching how Debug/Release already run everything
      # rather than cherry-picking just the concurrent tests.
      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TSAN=ON \
            -DLIQUIBOOK_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned explicitly (not the bare "clang-format" package) so the version CI checks
      # against can't silently drift out from under local development -- a real version
      # mismatch (local 22.x vs this) already caused one false-negative CI failure.
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          files=$(find . -name '*.cpp' -o -name '*.hpp' | grep -v '/build')
          if [ -n "$files" ]; then
            clang-format-18 --dry-run --Werror $files
          fi
